version: '3.8'

services:
  # OKR KPI Backend API
  app:
    image: tylerpham2708/okr-kpi-system-server:latest

    ports:
      - 3000:3000

    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback 
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s

    environment:
      # Node environment
      NODE_ENV: production
      HOST: ${HOST:-http://localhost}
      PORT: 3000
      BASE_URL: ${BASE_URL:-http://localhost}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Database (Neon)
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}

      # Redis (Upstash)
      REDIS_URL: ${REDIS_URL}

      # AI Provider (OpenAI or Gemini)
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_PAY_AS_YOU_GO_PRICE_PER_1M: ${AI_PAY_AS_YOU_GO_PRICE_PER_1M:-0.5}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
    
    networks:
      - okr-kpi-system-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - okr-kpi-system-network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - okr-kpi-system-network
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - redis_data:/data

networks:
  okr-kpi-system-network:
    driver: overlay

volumes:
  pgdata:
  redis_data: