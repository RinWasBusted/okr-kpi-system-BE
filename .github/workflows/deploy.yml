name: Deploy Backend to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: |
            tylerpham2708/okr-kpi-system-server:latest
            tylerpham2708/okr-kpi-system-server:${{ github.sha }}

      # Chỉ copy docker-compose.yml, không tạo/copy file .env từ GitHub nữa
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/okr-kpi-system/okr-kpi-system-be/"

      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: |
            IMAGE_TAG=${{ github.sha }}
          script: |
            cd ~/okr-kpi-system/okr-kpi-system-be/
            
            # 1. Export IMAGE_TAG để docker-compose.yml nhận diện được image mới
            export IMAGE_TAG=$IMAGE_TAG
            
            # 2. Đọc và Export các biến từ file .env có sẵn trên VPS vào môi trường shell
            # Lệnh này bỏ qua các dòng comment (#) và nạp biến để 'docker stack deploy' có thể dùng để interpolate
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
            else
              echo "Warning: .env file not found at $(pwd)"
            fi
            
            # 3. Deploy stack (Docker Swarm sẽ dùng các biến đã export ở trên)
            docker stack deploy --with-registry-auth -c docker-compose.yml okr_kpi_system_server
            
            # Dọn dẹp image cũ
            docker image prune -f