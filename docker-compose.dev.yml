version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - okr-kpi-system-network
    ports:
      - "5432:5432"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:latest
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - okr-kpi-system-network
    ports:
      - "6379:6379"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - redis_data:/data

networks:
  okr-kpi-system-network:

volumes:
  pgdata:
  redis_data: